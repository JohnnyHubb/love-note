<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A Note for Markee</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; font-family: Arial, sans-serif; background: #260511; color: white; }
    body { overflow: hidden; }
    .page {
      min-height: 100svh;
      width: 100%;
      padding: 56px 28px 42px;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      background: radial-gradient(circle at 50% 35%, #5b1029 0%, #330815 38%, #19040b 100%);
    }
    .page.active { display: flex; }
    .heart-main { font-size: 84px; color: #ff5d83; line-height: 1; margin-bottom: 42px; text-shadow: 0 0 24px rgba(255, 42, 95, .35); }
    .label { color: #ffb1c2; letter-spacing: 12px; font-weight: 700; font-size: 17px; margin-bottom: 46px; white-space: nowrap; }
    h1 { font-family: Georgia, 'Times New Roman', serif; font-size: clamp(44px, 11vw, 78px); line-height: 1.34; margin: 0; font-weight: 500; }
    .sub { font-family: Georgia, 'Times New Roman', serif; font-style: italic; font-size: clamp(26px, 7vw, 40px); line-height: 1.18; color: #ffe2e9; margin: 34px 0 28px; }
    .sig { color: #ff7e98; font-family: Georgia, 'Times New Roman', serif; font-size: 32px; margin: 0 0 48px; }
    button, a.btn { border: 0; border-radius: 999px; padding: 24px 42px; font-size: 28px; font-weight: 800; color: white; background: linear-gradient(90deg, #ff1e63, #ff2b68); box-shadow: 0 14px 35px rgba(255, 32, 97, .25); min-width: min(86vw, 390px); text-decoration: none; cursor: pointer; display: inline-block; }
    .outline { background: transparent; border: 3px solid rgba(255, 124, 154, .55); box-shadow: none; color: #ffb4c2; }
    .pick { color: #d98a9f; font-size: 30px; margin: 30px 0 42px; }
    .choices { display: flex; flex-direction: column; gap: 22px; width: 100%; align-items: center; }
    .tiny-heart { position: absolute; color: rgba(255, 96, 130, .18); font-size: 34px; animation: float 6s ease-in-out infinite; }
    .h1 { top: 18%; left: 15%; } .h2 { top: 36%; right: 16%; animation-delay: 1.2s; } .h3 { bottom: 19%; left: 13%; animation-delay: 2s; } .h4 { bottom: 12%; right: 18%; animation-delay: .4s; }
    @keyframes float { 0%,100%{ transform: translateY(0); opacity:.16;} 50%{ transform: translateY(-18px); opacity:.35;} }
    @media (max-height: 760px) {
      .page { padding-top: 28px; padding-bottom: 28px; justify-content: flex-start; overflow-y: auto; }
      .heart-main { margin-bottom: 22px; font-size: 70px; }
      .label { margin-bottom: 28px; font-size: 15px; letter-spacing: 9px; }
      h1 { font-size: clamp(38px, 10vw, 62px); }
      button, a.btn { padding: 20px 34px; font-size: 25px; }
    }
  </style>
</head>
<body>
  <section class="page active" id="page1">
    <span class="tiny-heart h1">♥</span><span class="tiny-heart h2">♥</span><span class="tiny-heart h3">♥</span>
    <div class="heart-main">♥</div>
    <div class="label">A NOTE FOR MARKEE</div>
    <h1>We've been on the go and under the weather since we got back from our trip...</h1>
    <div class="sub">and I've been missing our adult time.</div>
    <div class="sig">— Papa</div>
    <button onclick="goTo(2)">Keep reading →</button>
  </section>

  <section class="page" id="page2">
    <span class="tiny-heart h1">♥</span><span class="tiny-heart h2">♥</span><span class="tiny-heart h4">♥</span>
    <div class="heart-main">♥</div>
    <h1>Will you have a quickie with me?</h1>
    <div class="pick">Pick your time ↓</div>
    <div class="choices">
      <button onclick="chooseTime('2:00pm', '🌤️')">🌤️ 2:00pm</button>
      <button onclick="chooseTime('5:00pm', '🌇')">🌇 5:00pm</button>
      <button class="outline" onclick="chooseTime('maybe later', '❤️')">Maybe later</button>
    </div>
  </section>

  <section class="page" id="page3">
    <span class="tiny-heart h1">♥</span><span class="tiny-heart h2">♥</span><span class="tiny-heart h4">♥</span>
    <div class="heart-main">♥</div>
    <h1 id="finalTitle">You just made my day.</h1>
    <div class="sub" id="finalSub">See you at 2:00pm, love. 🌤️</div>
    <a class="btn outline" id="textLink" href="sms:YOUR_PHONE_NUMBER_HERE?body=Yes%20%E2%9D%A4%EF%B8%8F%20I'll%20see%20you%20at%202%3A00pm.">📱 Send this to him</a>
  </section>

  <script>
    function goTo(n) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById('page' + n).classList.add('active');
      window.scrollTo(0,0);
    }
    function chooseTime(time, emoji) {
      const title = document.getElementById('finalTitle');
      const sub = document.getElementById('finalSub');
      const link = document.getElementById('textLink');
      if (time === 'maybe later') {
        title.textContent = 'I still love you.';
        sub.textContent = 'Maybe later, love. ❤️';
        link.href = 'sms:YOUR_PHONE_NUMBER_HERE?body=Maybe%20later%2C%20love.%20%E2%9D%A4%EF%B8%8F';
      } else {
        title.textContent = 'You just made my day.';
        sub.textContent = `See you at ${time}, love. ${emoji}`;
        link.href = `sms:YOUR_PHONE_NUMBER_HERE?body=Yes%20%E2%9D%A4%EF%B8%8F%20I'll%20see%20you%20at%20${encodeURIComponent(time)}.`;
      }
      goTo(3);
    }
  </script>
</body>
</html>
